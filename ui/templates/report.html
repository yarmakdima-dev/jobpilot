<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Latest Report · JobPilot</title>
    <style>
      body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #0f172a; color: #e5e7eb; }
      .page { max-width: 1100px; margin: 0 auto; padding: 24px; }
      a { color: #93c5fd; text-decoration: none; }
      .panel { background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 18px; }
      pre { white-space: pre-wrap; word-break: break-word; background: #020617; border-radius: 6px; padding: 12px; }
      table { width: 100%; border-collapse: collapse; margin: 12px 0; }
      th, td { text-align: left; padding: 8px; border-bottom: 1px solid #1f2937; vertical-align: top; }
      h1, h2, h3 { color: #f8fafc; }
      p { color: #dbeafe; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main class="page">
      <a href="/">← Back to dashboard</a>
      <h1>{{ report_name or "Latest report" }}</h1>
      <div class="panel">{{ report_html | safe }}</div>
      <h2>Raw Markdown</h2>
      <pre>{{ raw_report }}</pre>
    </main>
  </body>
  </html>
